run:
  concurrency: 4
  timeout: 5m
  issues-exit-code: 1
  tests: true

linters:
  disable-all: true
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - typecheck
    - unused
    - gofmt
    - goimports
    - misspell
    - cyclop      # checks for high cyclomatic complexity (Big Tech standard)
    - bodyclose   # checks if HTTP response body is closed
    - errorlint   # finds code that will cause problems with the error wrapping scheme
    - gosec       # inspects source code for security problems

linters-settings:
  cyclop:
    # The maximal code complexity to report.
    # Functions that exceed this limit should be refactored (split).
    max-complexity: 15
